version: "1.0"
name: ${PROJECT_NAME}-workflow

agile_steps:
  1_vision:
    name: "Vision Definition"
    owner: "product_owner"
    description: "Define the high-level project vision and core user value."
  2_objectives:
    name: "Objectives Sourcing"
    owner: "product_owner"
    description: "Establish measurable key objectives and milestones."
  3_epic_and_features:
    name: "Epic & Feature Sourcing"
    owner: "architect"
    description: "Deconstruct vision into high-level Epics and intermediate deliverables (Features), including NFR elements and Feature Acceptance Criteria."
  4_user_story:
    name: "User Story Backlog"
    owner: "product_owner"
    description: "Write atomic User Stories associated to parente Features, detailing their functional acceptance criteria."
  5_dev:
    name: "Feature Development"
    owner: "developer"
    description: "Implement code logic and colocate unit/integration tests targeting the current Feature."
  6_local_test:
    name: "Iterative Local Testing"
    owner: "developer"
    description: "Run test suite locally. Verify functional criteria and NFR constraints (Limit: Max 5 local loops)."
  7_upload:
    name: "Feature Branch Upload"
    owner: "developer"
    description: "Commit code and push to a dedicated Feature branch `feat/[feature-name]` to trigger the CI (GitHub Actions) pipeline."
  8_ci_verification:
    name: "GitHub Actions CI Verification"
    owner: "qa_tester"
    description: "Analyze GitHub Actions CI test results. Validate Feature-level NFRs and acceptance criteria. If CI fails, return to step 5 (Limit: Max 5 CI correction loops)."
  9_success:
    name: "Definition of Done (Success)"
    owner: "product_owner"
    description: "Verify all Stories and parent Feature acceptance criteria/NFRs, then merge the Feature branch to the main branch."

roles:
  product_owner:
    role: "Product Owner"
    description: "Manages backlog priority, defines Vision, Objectives, and User Stories (Steps 1, 2, 4, 9)."
    model: "${SOTA_FRONTIER_MODEL}"
    instructions: |
      - Define project vision and key objectives in docs/backlog.md
      - Write user stories and functional acceptance criteria.
      - Perform final review (Definition of Done) to sign off Stories and Features.
      - **Associated Skills**: ${PO_SKILLS}

  architect:
    role: "Architect"
    description: "Specifies folder structure, designs specifications, maps Epics, Features, NFR requirements, and Feature Acceptance Criteria (Steps 3, 9)."
    model: "${SOTA_FRONTIER_MODEL}"
    instructions: |
      - Design technical specifications in docs/specifications.md
      - Deconstruct features into high-level Epics and intermediate Features.
      - Define specific NFRs (security, performance, etc.) and Acceptance Criteria for each Feature.
      - Ensure domain-driven vertical slices are followed.
      - Resolve integration conflicts and review branch merges.
      - **Associated Skills**: ${ARCHITECT_SKILLS}

  developer:
    role: "Developer"
    description: "Implements logic, tests locally, commits at Feature level, and pushes branch (Steps 5, 6, 7)."
    model: "${FAST_CONTEXT_MODEL}"
    instructions: |
      - Implement features using strict typing.
      - Colocate unit/integration tests.
      - Run local test suite iteratively (MAX 5 local test/fix loops). Validate both functional criteria and NFR constraints.
      - Create dedicated feature branches at `feat/[feature-name]` and push to GitHub to run CI.
      - **Associated Skills**: ${DEV_SKILLS}

  qa_tester:
    role: "QA Tester"
    description: "Monitors CI pipeline, audits security, and validates both functional and NFR criteria (Step 8)."
    model: "${FAST_CONTEXT_MODEL}"
    instructions: |
      - Monitor GitHub Actions CI test runs.
      - Audit NFR compliance (e.g. response time, secrets leak checks, coverage).
      - If CI fails, identify bugs and guide the developer to return to Step 5 (MAX 5 CI fix loops).
      - Sign off on User Stories and parent Features in docs/backlog.md only after successful CI verification of all functional and NFR acceptance criteria.
      - **Associated Skills**: ${QA_SKILLS}

rules:
  qa_gate: true
  enforce_branching: true
  main_branch: "main"
  conflict_resolver: "architect"
  max_local_loops: 5
  max_ci_loops: 5
